name: Build Custom OpenCV.js
on:
  workflow_dispatch:

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    container:
      # Використовуємо офіційний образ від розробників OpenCV, де все вже налаштовано
      image: opencv/opencvjs:20240122

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone OpenCV
        run: |
          git clone --depth 1 --branch 4.x https://github.com/opencv/opencv.git

      - name: Build OpenCV.js
        run: |
          # Копіюємо конфіг
          cp minimal_config.py opencv/platforms/js/minimal_config.py
          
          # Запускаємо збірку через готове середовище OpenCV
          python3 opencv/platforms/js/build_js.py build_out \
            --build_wasm \
            --config opencv/platforms/js/minimal_config.py

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: opencv-js-custom
          path: build_out/bin/opencv.js
